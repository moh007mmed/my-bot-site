<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>من نحن | MoMA AI - تجربة ثلاثية الأبعاد</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #000; color: #fff; overflow-x: hidden; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); transition: 0.4s; }
        .glass-card:hover { transform: translateZ(20px); border-color: #3b82f6; }
        .hero-text { text-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body x-data="{ open: false }">

    <div id="canvas-container"></div>

    <nav class="fixed top-0 w-full z-50 border-b border-white/10 bg-black/50 backdrop-blur-md px-8 h-20 flex justify-between items-center">
        <a href="index.html" class="text-3xl font-black tracking-tighter">MoMA <span class="text-blue-500">AI</span></a>
        <div class="hidden md:flex space-x-reverse space-x-8 font-medium">
            <a href="index.html" class="hover:text-blue-500 transition">الرئيسية</a>
            <a href="about.html" class="text-blue-500">من نحن</a>
            <a href="demo.html" class="hover:text-blue-500 transition">تجربة الديمو 🚀</a>
            <a href="contact.html" class="hover:text-blue-500 transition">تواصل معنا</a>
        </div>
        <button @click="open = !open" class="md:hidden text-2xl"><i class="fas fa-bars"></i></button>
    </nav>

    <main class="relative z-10 pt-40 px-6">
        <div class="max-w-6xl mx-auto grid md:grid-cols-2 gap-20 items-center">
            
            <div class="text-right space-y-8">
                <h1 class="text-5xl md:text-6xl font-black hero-text leading-tight">
                    نصمم <span class="text-blue-500">المستقبل</span> <br> بدقة جراحية
                </h1>
                <p class="text-gray-400 text-xl leading-relaxed">
                    في MoMA AI، قمنا بدمج دقة طب الأسنان مع ذكاء الخوارزميات. نحن لا نبرمج فقط، بل نصنع كيانات رقمية تتفاعل وتتطور لتخدم أعمالكم.
                </p>
                <div class="flex gap-4">
                    <div class="glass-card p-4 rounded-2xl flex-1 text-center">
                        <p class="text-3xl font-black text-blue-500">50+</p>
                        <p class="text-xs text-gray-500 uppercase">مشروع ذكي</p>
                    </div>
                    <div class="glass-card p-4 rounded-2xl flex-1 text-center">
                        <p class="text-3xl font-black text-blue-500">∞</p>
                        <p class="text-xs text-gray-500 uppercase">أتمتة مطلقة</p>
                    </div>
                </div>
            </div>

            <div class="h-[400px] flex items-center justify-center">
                <div class="hidden md:block text-blue-500/20 text-sm animate-pulse">
                    حرك الماوس للتفاعل مع MoMA Bot
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- إعداد العالم ثلاثي الأبعاد ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // --- إضافة إضاءة ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0x3b82f6, 2);
        pointLight.position.set(5, 5, 5);
        scene.add(pointLight);

        // --- بناء شخصية MoMA Bot (الأفاتار التفاعلي) ---
        const group = new THREE.Group();

        // الرأس (مجسم كروي)
        const headGeo = new THREE.SphereGeometry(1, 32, 32);
        const headMat = new THREE.MeshPhongMaterial({ color: 0x111111, shininess: 100, emissive: 0x0a0a0a });
        const head = new THREE.Mesh(headGeo, headMat);
        group.add(head);

        // العيون (تضيء)
        const eyeGeo = new THREE.SphereGeometry(0.15, 16, 16);
        const eyeMat = new THREE.MeshBasicMaterial({ color: 0x3b82f6 });
        const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
        leftEye.position.set(0.4, 0.2, 0.8);
        const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
        rightEye.position.set(-0.4, 0.2, 0.8);
        head.add(leftEye, rightEye);

        // حلقة طاقة حول الرأس
        const ringGeo = new THREE.TorusGeometry(1.4, 0.02, 16, 100);
        const ringMat = new THREE.MeshBasicMaterial({ color: 0x3b82f6, transparent: true, opacity: 0.3 });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = Math.PI/2;
        group.add(ring);

        scene.add(group);
        camera.position.z = 5;

        // --- التفاعل مع الماوس ---
        let mouseX = 0;
        let mouseY = 0;
        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
            mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
        });

        // --- التحريك المستمر ---
        function animate() {
            requestAnimationFrame(animate);

            // تتبع الماوس بسلاسة
            group.rotation.y += (mouseX * 0.5 - group.rotation.y) * 0.1;
            group.rotation.x += (-mouseY * 0.5 - group.rotation.x) * 0.1;
            
            // طفو الشخصية للأعلى والأسفل (Floating)
            group.position.y = Math.sin(Date.now() * 0.002) * 0.2;
            
            // دوران الحلقة
            ring.rotation.z += 0.01;

            renderer.render(scene, camera);
        }
        animate();

        // تحديث الحجم عند تغيير نافذة المتصفح
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
