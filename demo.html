<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تجربة البوت الذكي | MoMA AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #000000; color: #ffffff; overflow: hidden; }
        .ion-gradient-text { background: linear-gradient(90deg, #3b82f6, #2dd4bf); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* تأثيرات الإضاءة الخلفية للتركيز على البوت */
        .spotlight { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100vw; h-screen; background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, rgba(0, 0, 0, 0) 70%); blur: 50px; z-index: 0; }
        
        /* تحسين مظهر حاوية البوت */
        .bot-frame { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 2rem; box-shadow: 0 10px 100px -10px rgba(59, 130, 246, 0.1); width: 90%; max-width: 450px; h-[75vh]; overflow: hidden; position: relative; z-index: 10; transition: all 0.3s ease; }
        .bot-frame:hover { border: 1px solid rgba(59, 130, 246, 0.3); box-shadow: 0 10px 100px -5px rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body class="h-screen flex flex-col relative">

    <div class="spotlight"></div>

    <nav class="fixed top-0 w-full z-50 bg-black/50 backdrop-blur-md border-b border-white/5">
        <div class="max-w-7xl mx-auto px-6 h-16 flex justify-between items-center">
            <div class="text-xl font-black text-white">MoMA <span class="text-blue-500">AI</span></div>
            <a href="index.html" class="text-gray-400 hover:text-white transition text-sm">العودة للموقع الرئيسي ←</a>
        </div>
    </nav>

    <main class="flex-grow flex flex-col items-center justify-center pt-24 px-6 relative z-10">
        <div class="text-center mb-8">
            <span class="inline-block px-4 py-1.5 mb-3 text-xs font-bold text-blue-400 bg-blue-400/10 border border-blue-400/20 rounded-full">معمل التجارب التفاعلي</span>
            <h1 class="text-3xl md:text-5xl font-black mb-4 ion-gradient-text leading-tight">اسألني أي شيء</h1>
            <p class="text-sm md:text-base text-gray-500 max-w-sm mx-auto">أنا مساعد MoMA الذكي. جرب سرعة ردي ودقة أجوبتي الآن.</p>
        </div>

        <div class="bot-frame flex items-center justify-center text-center">
            <div class="text-gray-600 p-8">
                <i class="fas fa-brain text-6xl text-blue-900 animate-pulse mb-6"></i>
                <p class="font-bold">جارِ تحميل المساعد الذكي...</p>
                <p class="text-xs text-gray-700 mt-2">(هنا سيظهر شات بوت MoMA الفعلي بمجرد وضع الكود)</p>
            </div>
            
            </div>
    </main>

    <footer class="fixed bottom-0 w-full py-4 text-center text-xs text-gray-700 ion-border-t">
        نظام تجريبي مدعوم من MoMA AI
    </footer>

</body>
</html>
