<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoMA AI | تجربة البوت الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background: radial-gradient(circle at center, #111827 0%, #000 100%);
            color: #fff;
            overflow-x: hidden;
            perspective: 1000px; /* يعطي العمق ثلاثي الأبعاد للصفحة */
        }

        /* تحويل العناصر لتكون ثلاثية الأبعاد */
        .depth-layer {
            transition: transform 0.1s ease-out;
            transform-style: preserve-3d;
        }

        /* قائمة الهامبيرجر الجديدة */
        .mobile-menu {
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            transform: translateX(100%);
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .mobile-menu.active { transform: translateX(0); }

        /* البوت الصديق */
        .bot-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: translateZ(50px); /* يجعله يبرز للأمام */
        }

        .bot-trigger {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.4);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        .gradient-text {
            background: linear-gradient(to left, #fff, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body x-data="{ menuOpen: false }" @mousemove="moveElements($event)">

    <div class="mobile-menu" :class="menuOpen ? 'active' : ''">
        <button @click="menuOpen = false" class="absolute top-8 left-8 text-white text-3xl">
            <i class="fas fa-times"></i>
        </button>
        <a href="index.html" class="text-3xl font-bold hover:text-blue-500 transition">الرئيسية</a>
        <a href="about.html" class="text-3xl font-bold hover:text-blue-500 transition">عن MoMA</a>
        <a href="demo.html" class="text-3xl font-bold text-blue-500 underline">تجربة الديمو</a>
        <a href="contact.html" class="text-3xl font-bold hover:text-blue-500 transition">تواصل معنا</a>
    </div>

    <nav class="fixed top-0 w-full z-50 h-24 flex items-center px-8 bg-black/50 backdrop-blur-md border-b border-white/5">
        <div class="max-w-7xl mx-auto w-full flex justify-between items-center">
            <a href="index.html" class="text-4xl font-black tracking-tighter">MoMA<span class="text-blue-500">AI</span></a>
            
            <div class="hidden md:flex gap-10 font-bold">
                <a href="index.html" class="hover:text-blue-500 transition">الرئيسية</a>
                <a href="demo.html" class="text-blue-500">الديمو</a>
                <a href="contact.html" class="hover:text-blue-500 transition">تواصل</a>
            </div>

            <button @click="menuOpen = true" class="md:hidden text-2xl">
                <i class="fas fa-bars-staggered"></i>
            </button>
        </div>
    </nav>

    <main class="depth-layer min-h-screen pt-40 flex items-center justify-center px-6">
        <div class="max-w-6xl w-full grid lg:grid-cols-2 gap-20 items-center">
            
            <div class="space-y-8 text-right order-2 lg:order-1">
                <h1 class="text-6xl md:text-8xl font-black leading-none gradient-text">
                    رفيقك <br> الذكي
                </h1>
                <p class="text-gray-400 text-xl md:text-2xl leading-relaxed">
                    هذا البوت ليس مجرد آلة، إنه "صديق العمل" الذي يساعدك في إدارة صفقاتك بكل سهولة واحترافية. اضغط عليه لتبدأ المحادثة.
                </p>
                <div class="flex gap-4 justify-end">
                    <div class="px-6 py-3 rounded-2xl bg-white/5 border border-white/10 text-sm font-bold">
                        <i class="fas fa-bolt text-yellow-500 ml-2"></i> استجابة فورية
                    </div>
                    <div class="px-6 py-3 rounded-2xl bg-white/5 border border-white/10 text-sm font-bold">
                        <i class="fas fa-shield-halved text-blue-500 ml-2"></i> نظام آمن
                    </div>
                </div>
            </div>

            <div class="flex justify-center items-center order-1 lg:order-2">
                <div class="bot-card relative w-80 h-80 rounded-[40px] flex flex-col items-center justify-center p-10 text-center gap-6 group cursor-pointer" onclick="alert('البوت جاهز لمساعدتك يا محمد!')">
                    <div class="bot-trigger group-hover:scale-110 transition-transform duration-500">
                        <i class="fas fa-robot text-4xl text-white"></i>
                    </div>
                    <div>
                        <h3 class="text-2xl font-black mb-2 uppercase tracking-widest">MoMA Sidekick</h3>
                        <p class="text-xs text-blue-400 font-bold">اضغط لبدء الصداقة والعمل</p>
                    </div>
                    <div class="absolute -z-10 w-40 h-40 bg-blue-600/20 blur-[80px] rounded-full"></div>
                </div>
            </div>

        </div>
    </main>

    <script>
        // تأثير حركة الماوس ثلاثية الأبعاد
        function moveElements(e) {
            const layers = document.querySelectorAll('.depth-layer');
            const x = (window.innerWidth / 2 - e.pageX) / 25;
            const y = (window.innerHeight / 2 - e.pageY) / 25;

            layers.forEach(layer => {
                layer.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
            });
        }

        // للهواتف: استخدام الحساسات للإمالة (اختياري)
        window.addEventListener('deviceorientation', (e) => {
            const layers = document.querySelectorAll('.depth-layer');
            const x = e.gamma / 2; // tilt left/right
            const y = e.beta / 2;  // tilt forward/back
            
            layers.forEach(layer => {
                layer.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
            });
        });
    </script>
</body>
</html>
