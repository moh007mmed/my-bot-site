<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تجربة النظام الذكي | MoMA AI Labs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #030712; color: #ffffff; overflow-x: hidden; min-height: 100vh; position: relative; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; opacity: 0.8; }
        .glass-ui { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body x-data="{ open: false }">

    <div id="canvas-container"></div>

    <nav class="fixed top-0 w-full z-50 border-b border-white/10 bg-black/90 backdrop-blur-lg h-20 flex items-center">
        <div class="max-w-7xl mx-auto px-6 w-full flex justify-between items-center">
            <a href="index.html" class="text-3xl font-black tracking-tighter text-white">
                MoMA <span class="text-blue-500">AI</span>
            </a>
            
            <div class="hidden md:flex items-center space-x-reverse space-x-8 font-medium">
                <a href="index.html" class="text-gray-400 hover:text-white transition">الرئيسية</a>
                <a href="about.html" class="text-gray-400 hover:text-white transition">من نحن</a>
                <a href="demo.html" class="text-blue-500 font-bold underline">تجربة الديمو 🚀</a>
                <a href="contact.html" class="text-gray-400 hover:text-white transition">تواصل معنا</a>
            </div>

            <div class="md:hidden">
                <button @click="open = !open" class="text-white p-2">
                    <i class="fas" :class="open ? 'fa-times text-2xl' : 'fa-bars text-xl'"></i>
                </button>
            </div>
        </div>

        <div x-show="open" @click.away="open = false" class="fixed top-20 left-0 w-full bg-black/95 px-6 py-8 space-y-6 md:hidden">
            <a href="index.html" class="block text-xl font-bold text-gray-400">الرئيسية</a>
            <a href="demo.html" class="block text-xl font-bold text-blue-500">تجربة الديمو 🚀</a>
        </div>
    </nav>

    <main class="relative z-10 pt-40 pb-20 flex items-center justify-center px-6">
        <div class="grid lg:grid-cols-2 gap-16 max-w-6xl w-full items-center">
            <div class="text-right space-y-6">
                <h1 class="text-5xl md:text-7xl font-black leading-tight text-white">
                    حارس <br><span class="text-transparent bg-clip-text bg-gradient-to-l from-blue-400 to-cyan-400">الأنظمة الرقمية</span>
                </h1>
                <p class="text-gray-400 text-xl max-w-xl">
                    مرحباً بك في لوحة تحكم MoMA. لقد تم تصميم هذه الصفحة لتحاكي ما سيكون عليه شات بوت الذكاء الإصطناعي الخاص بك. البوت جاهز الآن في الزاوية السفلى للتفاعل معك بشكل مباشر.
                </p>
            </div>

            <div class="hidden lg:block">
                <div class="glass-ui w-full h-[400px] rounded-3xl p-8 bg-black/50 border-white/10 flex items-center justify-center">
                    <i class="fas fa-robot text-blue-500 text-6xl animate-bounce"></i>
                </div>
            </div>
        </div>
    </main>

    <script>
        // إعداد مشهد الـ 3D البسيط للخلفية
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const geometry = new THREE.TorusGeometry(10, 3, 16, 100);
        const material = new THREE.MeshBasicMaterial({ color: 0x3b82f6, wireframe: true, transparent: true, opacity: 0.1 });
        const torus = new THREE.Mesh(geometry, material);
        scene.add(torus);

        camera.position.z = 30;

        function animate() {
            requestAnimationFrame(animate);
            torus.rotation.x += 0.001;
            torus.rotation.y += 0.002;
            renderer.render(scene, camera);
        }
        animate();
    </script>
    
    <script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>
    <script src="https://files.bpcontent.cloud/2026/04/09/13/20260409130243-8U4X054Z.js" defer></script>
</body>
</html>
