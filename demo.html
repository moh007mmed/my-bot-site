<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تجربة النظام | العميل السري MoMA AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #050505; color: #fff; overflow-x: hidden; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .bot-trigger {
            position: fixed; bottom: 30px; right: 30px; width: 80px; height: 80px;
            background: #3b82f6; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.6); z-index: 100; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body x-data="{ open: false }">

    <div id="canvas-container"></div>

    <div class="bot-trigger">
        <i class="fas fa-comment-alt text-3xl text-white"></i>
    </div>

    <nav class="fixed top-0 w-full z-50 bg-black/80 backdrop-blur-md border-b border-white/10 h-20 flex items-center">
        <div class="max-w-7xl mx-auto px-6 w-full flex justify-between items-center">
            <a href="index.html" class="text-3xl font-black tracking-tighter">MoMA <span class="text-blue-500">AI</span></a>
            <div class="hidden md:flex space-x-reverse space-x-8 font-medium">
                <a href="index.html" class="text-gray-400 hover:text-white">الرئيسية</a>
                <a href="about.html" class="text-gray-400 hover:text-white">من نحن</a>
                <a href="demo.html" class="text-blue-500 font-bold">تجربة الديمو 🚀</a>
            </div>
            <button @click="open = !open" class="md:hidden text-white"><i class="fas fa-bars text-2xl"></i></button>
        </div>
        <div x-show="open" class="fixed top-20 left-0 w-full bg-black p-8 flex flex-col gap-6 md:hidden border-b border-white/10">
            <a href="index.html" class="text-xl">الرئيسية</a>
            <a href="about.html" class="text-xl">من نحن</a>
            <a href="demo.html" class="text-xl text-blue-500">تجربة الديمو</a>
        </div>
    </nav>

    <main class="relative z-10 pt-40 px-6 max-w-6xl mx-auto grid md:grid-cols-2 gap-10 items-center">
        <div class="text-right space-y-6">
            <h1 class="text-6xl font-black leading-tight">العميل السري <br><span class="text-blue-500">لإغلاق الصفقات</span></h1>
            <p class="text-gray-400 text-xl">اتبع إشارة العميل "جيمس" في يسار الشاشة، فهو يوجهك لأذكى بوت مبيعات تم بناؤه خصيصاً لك.</p>
            <div class="glass-card p-6 rounded-3xl inline-block">
                <p class="text-sm text-blue-400 font-bold mb-2 tracking-widest uppercase">Agent Status</p>
                <p class="text-2xl font-black">READY TO SELL</p>
            </div>
        </div>
    </main>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // الإضاءة (لإظهار المجسم بوضوح)
        const light = new THREE.DirectionalLight(0xffffff, 1.5);
        light.position.set(2, 2, 5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        const agent = new THREE.Group();

        // 1. الجسم (البدلة السوداء)
        const bodyGeo = new THREE.CylinderGeometry(0.5, 0.3, 2, 32);
        const bodyMat = new THREE.MeshPhongMaterial({ color: 0x111111 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        agent.add(body);

        // 2. الرأس
        const headGeo = new THREE.SphereGeometry(0.4, 32, 32);
        const headMat = new THREE.MeshPhongMaterial({ color: 0xffdbac }); // لون بشرة
        const head = new THREE.Mesh(headGeo, headMat);
        head.position.y = 1.4;
        agent.add(head);

        // 3. النظارات (James Bond Style)
        const glassGeo = new THREE.BoxGeometry(0.5, 0.15, 0.1);
        const glassMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
        const glasses = new THREE.Mesh(glassGeo, glassMat);
        glasses.position.set(0, 1.45, 0.35);
        head.add(glasses);

        // 4. اليد المشيرة (أهم جزء للتوجيه)
        const armGeo = new THREE.CylinderGeometry(0.08, 0.08, 1.2, 16);
        const arm = new THREE.Mesh(armGeo, bodyMat);
        arm.position.set(0.6, 0.8, 0.4);
        arm.rotation.z = -Math.PI / 3; // وضعية الإشارة لليمين
        arm.rotation.x = Math.PI / 4;
        agent.add(arm);

        scene.add(agent);
        camera.position.z = 5;

        // التفاعل مع الماوس
        let mouseX = 0, mouseY = 0;
        window.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
            mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
        });

        function animate() {
            requestAnimationFrame(animate);
            
            // تحريك العميل في اليسار
            agent.position.x = -2.5; 
            agent.position.y = Math.sin(Date.now() * 0.002) * 0.2; // طفو هادئ

            // الرأس يلحق الماوس (حركة تفاعلية)
            head.rotation.y = mouseX * 0.5;
            head.rotation.x = mouseY * 0.3;

            // الجسم يميل قليلاً مع الحركة
            agent.rotation.y = mouseX * 0.1;

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
