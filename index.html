<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معرض أعمال محمد لمحركات الدردشة الذكية</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: white; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; text-align: center; }
        .card { background: rgba(255, 255, 255, 0.1); padding: 40px; border-radius: 20px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        p { font-size: 1.2rem; opacity: 0.9; }
        .status { color: #4eff4e; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h1>مرحباً بك في عالم الذكاء الاصطناعي</h1>
        <p>أنا متخصص في بناء مساعدين ذكيين لتطوير أعمالك.</p>
        <p class="status">● البوت متاح حالياً للتجربة في الأسفل</p>
    </div>
</body>
</html>
